name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - name: Patch Worker KV namespace
        run: |
          node -e "const fs=require('fs');const p='wrangler.toml';let s=fs.readFileSync(p,'utf8');s=s.replace('REPLACE_WITH_KV_NAMESPACE_ID', process.env.CLOUDFLARE_KV_NAMESPACE_ID);fs.writeFileSync(p,s);"
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set Worker admin password
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Set optional Worker relay secrets
        run: |
          if [ -n "$HEYUN_RELAY_URL" ]; then printf '%s' "$HEYUN_RELAY_URL" | npx wrangler secret put HEYUN_RELAY_URL --config wrangler.toml; fi
          if [ -n "$HEYUN_RELAY_TOKEN" ]; then printf '%s' "$HEYUN_RELAY_TOKEN" | npx wrangler secret put HEYUN_RELAY_TOKEN --config wrangler.toml; fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HEYUN_RELAY_URL: ${{ secrets.HEYUN_RELAY_URL }}
          HEYUN_RELAY_TOKEN: ${{ secrets.HEYUN_RELAY_TOKEN }}
      - name: Redeploy Worker with secrets
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - name: Ensure Pages project
        run: npx wrangler pages project create "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}" --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
      - name: Deploy Pages
        run: |
          node -e "const fs=require('fs');const p='wrangler.pages.toml';let s=fs.readFileSync(p,'utf8');s=s.replace('REPLACE_WITH_KV_NAMESPACE_ID', process.env.CLOUDFLARE_KV_NAMESPACE_ID);fs.writeFileSync(p,s);"
          cp wrangler.pages.toml wrangler.toml
          npx wrangler pages deploy pages --project-name "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
      - name: Set Pages admin password
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler pages secret put ADMIN_PASSWORD --project-name "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      - name: Set optional Pages relay secrets
        run: |
          if [ -n "$HEYUN_RELAY_URL" ]; then printf '%s' "$HEYUN_RELAY_URL" | npx wrangler pages secret put HEYUN_RELAY_URL --project-name "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}"; fi
          if [ -n "$HEYUN_RELAY_TOKEN" ]; then printf '%s' "$HEYUN_RELAY_TOKEN" | npx wrangler pages secret put HEYUN_RELAY_TOKEN --project-name "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}"; fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          HEYUN_RELAY_URL: ${{ secrets.HEYUN_RELAY_URL }}
          HEYUN_RELAY_TOKEN: ${{ secrets.HEYUN_RELAY_TOKEN }}
      - name: Redeploy Pages with secrets
        run: |
          cp wrangler.pages.toml wrangler.toml
          npx wrangler pages deploy pages --project-name "${CLOUDFLARE_PAGES_PROJECT:-heyun-monitor-pages}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
